<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة عيد الأضحى - فريق لطف التطوعي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .input-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        input { width: 85%; padding: 12px; margin: 20px 0; border: 2px solid #005a87; border-radius: 8px; font-size: 16px; text-align: center; outline: none; }
        button { background-color: #005a87; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin: 5px; }
        
        /* حاوية البطاقة والصورة */
        #capture-area { position: relative; width: 100%; max-width: 500px; display: none; margin: 0 auto; overflow: hidden; border-radius: 10px; }
        .bg-img { width: 100%; display: block; }
        
        /* ضبط موقع الاسم بالضبط في المكان المفرغ بالأسفل لتصميم فريق لطف */
        /* التعديل: حجم الخط أصغر (18px) واللون أسود تماماً (#000000) */
        #user-name-overlay {
            position: absolute;
            top: 70.2%; /* تم وزنه بدقة ليكون داخل المربع تماماً */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45%;
            text-align: center;
            font-size: 18px; /* تم تصغير حجم الخط */
            font-weight: bold;
            color: #000000; /* تم تغيير اللون ليكون أسود تماماً */
            white-space: nowrap;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .controls { display: none; text-align: center; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div id="setup" class="input-box">
        <h2 style="color:#005a87;">بطاقة تهنئة رقمية 🌙</h2>
        <p>أدخل الاسم المراد طباعته على بطاقة فريق لطف</p>
        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا...">
        <br>
        <button onclick="generate()">عرض البطاقة</button>
    </div>

    <div id="capture-area">
        <img src="bg.png" class="bg-img">
        <div id="user-name-overlay"></div>
    </div>

    <div id="controls-area" class="controls">
        <button onclick="downloadCard()" style="background-color: #28a745;">تحميل البطاقة (صورة)</button>
        <button onclick="location.reload()" style="background-color: #6c757d;">إنشاء بطاقة أخرى</button>
    </div>

    <script>
        function generate() {
            const name = document.getElementById('nameInput').value;
            if(name.trim() !== "") {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('capture-area').style.display = 'block';
                document.getElementById('controls-area').style.display = 'block';
                document.getElementById('user-name-overlay').innerText = name;
            } else {
                alert("يرجى إدخال الاسم أولاً");
            }
        }

        function downloadCard() {
            const card = document.getElementById('capture-area');
            const nameOverlay = document.getElementById('user-name-overlay');
            
            // ضبط جودة التحميل وتأكيد تطبيق الأنماط على الصورة المنشأة
            html2canvas(card, { 
                useCORS: true, 
                scale: 3, // دقة عالية
                onclone: (clonedDoc) => {
                    // تأكيد أن الاسم في الصورة المنشأة يتبع نفس الأنماط
                    const clonedName = clonedDoc.getElementById('user-name-overlay');
                    clonedName.style.fontSize = '18px';
                    clonedName.style.color = '#000000';
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'lutf-eid-card.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
